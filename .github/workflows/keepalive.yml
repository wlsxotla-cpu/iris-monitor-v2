name: 대시보드 깨우기 (매일 2시간 간격)

on:
  schedule:
    # 매일(주말 포함) 2시간 간격 = 00:00,02:00,04:00,06:00,08:00,10:00,12:00,14:00,16:00,18:00,20:00,22:00 UTC
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboards to prevent sleeping
        run: |
          curl -s -o /dev/null --max-time 30 https://iris-monitor.streamlit.app/ || true
          curl -s -o /dev/null --max-time 30 https://srome-dashboard.streamlit.app/ || true
