name: 대시보드 깨우기 (매일 2시간 간격)

on:
  schedule:
    # 매일(주말 포함) 2시간 간격 = 00:00,02:00,04:00,06:00,08:00,10:00,12:00,14:00,16:00,18:00,20:00,22:00 UTC
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Wake dashboards
        run: python wake_apps.py
