name: IRIS 공고 스크래핑

on:
  schedule:
    # 매일 새벽 06:15 KST = 전날 21:15 UTC (9시 전에 확실히 끝나도록 여유를 둠, 정각이 아닌 분으로 지정해 GitHub 지연 최소화)
    - cron: "15 21 * * *"
  workflow_dispatch: {}

concurrency:
  group: iris-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Run SROME scraper
        run: python srome_scraper.py

      - name: Commit results
        run: |
          git config user.name "iris-monitor-bot"
          git config user.email "actions@github.com"
          git add results/latest.md results/latest.json results/srome.json
          git diff --cached --quiet && echo "변경 없음" || git commit -m "chore: update 공고 현황 ($(date -u +%Y-%m-%d))"
          git pull --rebase origin main
          git push
