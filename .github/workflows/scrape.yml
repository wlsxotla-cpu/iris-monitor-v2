name: IRIS 공고 스크래핑

on:
  schedule:
    # 매일 평일 09:00 KST = 00:00 UTC
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "iris-monitor-bot"
          git config user.email "actions@github.com"
          git add results/latest.md
          git diff --cached --quiet && echo "변경 없음" || git commit -m "chore: update IRIS 공고 현황 ($(date -u +%Y-%m-%d))"
          git push
