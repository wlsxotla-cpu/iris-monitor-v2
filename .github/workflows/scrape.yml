name: IRIS 공고 스크래핑

on:
  schedule:
    # 매일 평일 09:00 KST = 00:00 UTC
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: iris-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Run SROME scraper
        run: python srome_scraper.py

      - name: Commit results
        run: |
          git config user.name "iris-monitor-bot"
          git config user.email "actions@github.com"
          git add results/latest.md results/latest.json results/srome.json
          git diff --cached --quiet && echo "변경 없음" || git commit -m "chore: update 공고 현황 ($(date -u +%Y-%m-%d))"
          git pull --rebase origin main
          git push

      - name: Ping dashboards to prevent sleeping
        run: |
          curl -s -o /dev/null --max-time 30 https://iris-monitor.streamlit.app/ || true
          curl -s -o /dev/null --max-time 30 https://srome-dashboard.streamlit.app/ || true
